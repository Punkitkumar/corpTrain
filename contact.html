<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Generative AI, Claude AI, ChatGPT, Digital Marketing Trainer</title>
  <meta name="description" content="Contact Hitesh Motwani for Generative AI training, ChatGPT coaching, and Digital Marketing corporate training programs.">
  <link rel="icon" href="assets/images/cropped-LP-HITESH-180x180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-header"></div>

  <main>

    <section class="page-hero">
      <div class="container">
        <p class="testimonials-label">GET IN TOUCH</p>
        <h1>Connect With Us</h1>
        <p>A Good Story Begins With Saying Hi</p>
      </div>
    </section>

    <section class="content-section">
      <div class="container contact-grid">
        <div class="contact-info">
          <h2 class="section-title section-title-left">Contact Us</h2>
          <p><strong>Email:</strong> contact@hiteshmotwani.com</p>
          <p><strong>Phone:</strong> +91 98924 14313</p>
          <p><strong>Book a call:</strong> <a href="https://calendly.com/hitesh-analyst/online-consulting" target="_blank" rel="noopener" style="color:var(--blue)">Schedule on Calendly</a></p>

          <h3 style="margin-top:32px">Follow Our Social Network</h3>
          <div class="social-links">
            <a href="https://www.facebook.com/digitaltrainerhitesh/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://x.com/wisdomsingh" target="_blank" rel="noopener" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="https://www.linkedin.com/in/hiteshmotwani/" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="https://web.whatsapp.com/send?phone=919892414313" target="_blank" rel="noopener" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
          </div>
        </div>

        <form class="contact-form" id="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="+91">
          </div>
          <div class="form-group">
            <label for="purpose">Purpose of contacting</label>
            <select id="purpose" name="purpose" required>
              <option value="">Select purpose</option>
              <option value="Corporate Training">Corporate Training</option>
              <option value="Generative AI Training">Generative AI Training</option>
              <option value="ChatGPT Training">ChatGPT Training</option>
              <option value="Digital Marketing Course">Digital Marketing Course</option>
              <option value="Consulting">Consulting</option>
              <option value="Keynote Speaking">Keynote Speaking</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn">SEND</button>
          <p class="form-message"></p>
        </form>
      </div>
    </section>

    <section class="cta-banner">
      <div class="container">
        <h2>Book A Free Consultation Call</h2>
        <a href="https://calendly.com/hitesh-analyst/online-consulting" class="btn btn-blue" target="_blank" rel="noopener">BOOK A CALL WITH HITESH</a>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
